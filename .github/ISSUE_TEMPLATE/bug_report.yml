name: Bug Report
description: Something is not working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which mode were you using when the bug occurred?
      options:
        - TUI (interactive terminal UI)
        - Headless / CLI (`generate` subcommand)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `java -jar quarkus-forge.jar --version` or the release tag
      placeholder: "e.g. 0.2.1 or 0.2.1-SNAPSHOT"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java Version
      description: Output of `java --version`
      placeholder: "e.g. OpenJDK 25.0.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal (for TUI bugs)
      description: Terminal emulator and $TERM value, if relevant
      placeholder: "e.g. Alacritty, TERM=xterm-256color"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `java -jar quarkus-forge-headless.jar generate --group-id org.acme ...`
        2. Observe error
    validations:
      required: true

  - type: textarea
    id: verbose-output
    attributes:
      label: Verbose Output
      description: Output of the same command with `--verbose` flag appended (if applicable)
      render: text

  - type: textarea
    id: forgefile
    attributes:
      label: Forgefile (if applicable)
      description: Contents of your `Forgefile` if the bug is reproducible from one
      render: json
