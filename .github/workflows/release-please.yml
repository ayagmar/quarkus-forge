name: Release Cut

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-cut:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute release and next development versions
        id: versions
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ github.event.inputs.bump }}"
              exit 1
              ;;
          esac

          release_version="${major}.${minor}.${patch}"
          next_dev_version="${major}.${minor}.$((patch + 1))-SNAPSHOT"

          {
            echo "latest_tag=${latest_tag}"
            echo "release_version=${release_version}"
            echo "next_dev_version=${next_dev_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Set release version
        run: mvn -B -ntp versions:set -DnewVersion=${{ steps.versions.outputs.release_version }} -DgenerateBackupPoms=false

      - name: Update CHANGELOG.md for release
        run: |
          set -euo pipefail
          release_version="${{ steps.versions.outputs.release_version }}"
          latest_tag="${{ steps.versions.outputs.latest_tag }}"
          release_tag="v${release_version}"
          repo_url="https://github.com/${{ github.repository }}"
          release_date="$(date -u +%Y-%m-%d)"

          commits="$(git log --no-merges --pretty='- %s (%h)' "${latest_tag}..HEAD")"
          if [ -z "${commits}" ]; then
            commits="- No user-facing changes in this release."
          fi

          if [ ! -f CHANGELOG.md ]; then
            printf '%s\n' \
              '# Changelog' \
              '' \
              'All notable changes to this project will be documented in this file.' \
              > CHANGELOG.md
          fi

          unreleased_line="$(grep -n '^## \[Unreleased\]' CHANGELOG.md | head -n1 | cut -d: -f1 || true)"
          new_unreleased="## [Unreleased](${repo_url}/compare/${release_tag}...HEAD)"
          release_heading="## [${release_version}](${repo_url}/compare/${latest_tag}...${release_tag}) (${release_date})"

          if [ -n "${unreleased_line}" ]; then
            head -n "$((unreleased_line - 1))" CHANGELOG.md > CHANGELOG.tmp
            {
              echo "${new_unreleased}"
              echo
              echo "${release_heading}"
              echo
              echo "### Changed"
              echo
              printf '%s\n' "${commits}"
              echo
            } >> CHANGELOG.tmp
            tail -n "+$((unreleased_line + 1))" CHANGELOG.md >> CHANGELOG.tmp
          else
            {
              printf '%s\n' '# Changelog'
              printf '%s\n' ''
              printf '%s\n' 'All notable changes to this project are documented here.'
              printf '%s\n' 'This project uses [Conventional Commits](https://www.conventionalcommits.org/).'
              printf '%s\n' ''
              printf '%s\n' "${new_unreleased}"
              printf '%s\n' ''
              printf '%s\n' "${release_heading}"
              printf '%s\n' ''
              printf '%s\n' '### Changed'
              printf '%s\n' ''
              printf '%s\n' "${commits}"
            } > CHANGELOG.tmp
          fi

          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit and tag release
        run: |
          set -euo pipefail
          git add pom.xml CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No release version change detected."
            exit 1
          fi
          git commit -m "chore(release): cut v${{ steps.versions.outputs.release_version }}"
          git tag "v${{ steps.versions.outputs.release_version }}"

      - name: Set next development snapshot
        run: mvn -B -ntp versions:set -DnewVersion=${{ steps.versions.outputs.next_dev_version }} -DgenerateBackupPoms=false

      - name: Commit next development snapshot
        run: |
          set -euo pipefail
          git add pom.xml
          if git diff --cached --quiet; then
            echo "No snapshot version change detected."
            exit 1
          fi
          git commit -m "chore(release): prepare next iteration ${{ steps.versions.outputs.next_dev_version }}"

      - name: Push commits and tag
        run: |
          set -euo pipefail
          git push origin HEAD:master
          git push origin "v${{ steps.versions.outputs.release_version }}"
