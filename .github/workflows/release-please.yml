name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: maven
          target-branch: master

      - name: Auto-merge release-please PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          if [ -z "$PRS_JSON" ] || [ "$PRS_JSON" = "[]" ]; then
            echo "No release PR payload to merge."
            exit 0
          fi
          echo "$PRS_JSON" | jq -r '.[].number' | while read -r pr_number; do
            gh pr merge "$pr_number" --auto --squash --delete-branch
          done
