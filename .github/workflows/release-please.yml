name: Release Please

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release-as version
        id: version
        run: |
          set -euo pipefail
          current="$(jq -r '."."' .release-please-manifest.json)"
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ github.event.inputs.bump }}"
              exit 1
              ;;
          esac

          echo "release_as=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ steps.version.outputs.release_as }}
          skip-github-release: true

      - name: Auto-merge release-please PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          if [ -z "$PRS_JSON" ] || [ "$PRS_JSON" = "[]" ]; then
            echo "No release PR payload to merge."
            exit 0
          fi

          git fetch origin master --tags
          echo "$PRS_JSON" | jq -r '.[].number' | while read -r pr_number; do
            gh pr merge "$pr_number" --repo ayagmar/quarkus-forge --squash --delete-branch

            pr_json="$(gh pr view "$pr_number" --repo ayagmar/quarkus-forge --json title,mergeCommit)"
            version="$(echo "$pr_json" | jq -r '.title | capture("release (?<v>[0-9]+\\.[0-9]+\\.[0-9]+)") | .v')"
            sha="$(echo "$pr_json" | jq -r '.mergeCommit.oid')"
            tag="v${version}"

            if [ -z "$version" ] || [ "$version" = "null" ] || [ -z "$sha" ] || [ "$sha" = "null" ]; then
              echo "Unable to derive release tag for PR #$pr_number"
              exit 1
            fi

            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
              echo "Tag ${tag} already exists on origin."
              continue
            fi

            git tag -a "${tag}" "${sha}" -m "Release ${tag}"
            git push origin "${tag}"
          done
