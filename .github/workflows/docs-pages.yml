name: Docs Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs dependencies
        run: npm ci --prefix site

      - name: Build docs site
        run: npm run docs:build --prefix site

      - name: Validate Pages artifact layout
        run: |
          test -f site/build/pages/index.html
          test -f site/build/pages/docs/index.html

      - name: Verify links
        run: npm run docs:linkcheck --prefix site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
