name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: 'maven'

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs dependencies
        run: npm ci --prefix site

      - name: Docs build
        run: npm run docs:build --prefix site

      - name: Spotless check
        run: ./mvnw spotless:check

      - name: Headless profile compile check
        run: ./mvnw clean compile -Pheadless

  tests:
    name: Tests (${{ matrix.os }}, ${{ matrix.suite }})
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        suite: [unit, integration]
        include:
          - suite: unit
            command: ./mvnw test -Djacoco.skip=true
          - suite: integration
            command: ./mvnw verify -DskipTests=true -Djacoco.skip=true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: 'maven'

      - name: Run ${{ matrix.suite }} tests
        shell: bash
        run: ${{ matrix.command }}

  coverage:
    name: Coverage
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: 'maven'

      - name: Run tests with coverage
        run: ./mvnw clean verify

      - name: Verify coverage files exist
        run: |
          test -s target/site/jacoco/jacoco.xml

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-merged-report
          path: target/site/jacoco/
          retention-days: 14
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          verbose: false

  ci-status:
    name: CI Status
    if: always()
    needs: [quality, tests, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || "${{ needs.tests.result }}" != "success" || "${{ needs.coverage.result }}" != "success" ]]; then
            echo "CI failed — see individual job logs above."
            exit 1
          fi
          echo "All CI checks passed."
