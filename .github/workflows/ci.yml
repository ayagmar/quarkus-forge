name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/maven.config') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install docs dependencies
        run: npm ci --prefix site

      - name: Docs build
        run: npm run docs:build --prefix site

      - name: Spotless check
        run: mvn -B -ntp spotless:check

      - name: Checkstyle check
        run: mvn -B -ntp checkstyle:check

  tests:
    name: Tests (${{ matrix.os }}, ${{ matrix.suite }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        suite: [unit, integration]
        include:
          - suite: unit
            command: mvn -B -ntp test
          - suite: integration
            command: mvn -B -ntp verify -DskipTests=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/maven.config') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run ${{ matrix.suite }} tests
        run: ${{ matrix.command }}
