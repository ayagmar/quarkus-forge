name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-jvm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/maven.config') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Package JVM artifact
        run: mvn -B -ntp -DskipTests package

      - name: Rename JVM artifact
        run: cp target/quarkus-forge.jar target/quarkus-forge-jvm.jar

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-forge-jvm
          path: target/quarkus-forge-jvm.jar

  package-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
          - os: macos-latest
            platform: macos-aarch64
            ext: ''
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Visual Studio Build Tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml', '.mvn/maven.config') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build native artifact
        run: mvn -B -ntp -Pnative "-Dnative.skip=false" "-DskipTests" package

      - name: Rename native artifact
        shell: bash
        run: |
          cp target/quarkus-forge${{ matrix.ext }} target/quarkus-forge-${{ matrix.platform }}${{ matrix.ext }}

      - name: Make native artifact executable
        if: runner.os != 'Windows'
        run: chmod +x target/quarkus-forge-${{ matrix.platform }}${{ matrix.ext }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-forge-native-${{ matrix.platform }}
          path: target/quarkus-forge-${{ matrix.platform }}${{ matrix.ext }}

  package-jbang-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JBang catalog
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p dist
          cp jbang-catalog.json dist/jbang-catalog.json
          sed -i "s#github.com/[^/]*/[^/]*/releases/latest/download/#github.com/${REPO}/releases/download/${TAG}/#g" dist/jbang-catalog.json

      - name: Prepare org-level JBang catalog
        run: cp dist/jbang-catalog.json dist/jbang-catalog-org.json

      - name: Upload JBang catalog
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-forge-jbang-catalog
          path: dist/jbang-catalog.json

      - name: Upload org-level JBang catalog
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-forge-jbang-catalog-org
          path: dist/jbang-catalog-org.json

      - name: Publish org-level catalog repository
        if: startsWith(github.ref, 'refs/tags/v') && env.TOKEN != ''
        env:
          TOKEN: ${{ secrets.JBANG_CATALOG_PUSH_TOKEN }}
          CATALOG_REPO: ayagmar/jbang-catalog
          TAG: ${{ github.ref_name }}
        run: |
          rm -rf .tmp-jbang-catalog
          git clone "https://x-access-token:${TOKEN}@github.com/${CATALOG_REPO}.git" .tmp-jbang-catalog
          cp dist/jbang-catalog-org.json .tmp-jbang-catalog/jbang-catalog.json
          cd .tmp-jbang-catalog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No catalog changes to publish."
            exit 0
          fi
          git add jbang-catalog.json
          git commit -m "Update quarkus-forge alias for ${TAG}"
          git push

  publish-release:
    needs:
      - package-jvm
      - package-native
      - package-jbang-catalog
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make native artifacts executable
        run: chmod +x artifacts/quarkus-forge-linux-* artifacts/quarkus-forge-macos-* || true

      - name: Derive release version from git tag
        run: echo "JRELEASER_PROJECT_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish GitHub release with JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
