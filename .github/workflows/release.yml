name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-jvm:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: 'maven'

      - name: Package JVM artifact
        run: ./mvnw -DskipTests package

      - name: Rename JVM artifact
        run: cp target/quarkus-forge.jar target/quarkus-forge-jvm.jar

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-forge-jvm
          path: target/quarkus-forge-jvm.jar

      - name: Package headless JVM artifact
        run: ./mvnw clean package -Pheadless

      - name: Upload headless JVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-forge-headless-jvm
          path: target/quarkus-forge-headless.jar

  package-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
            profiles: -Pnative
            binary_name: quarkus-forge
          - os: macos-latest
            platform: macos-aarch64
            ext: ''
            profiles: -Pnative
            binary_name: quarkus-forge
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'
            profiles: -Pnative
            binary_name: quarkus-forge
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
            profiles: -Pheadless,headless-native
            binary_name: quarkus-forge-headless
          - os: macos-latest
            platform: macos-aarch64
            ext: ''
            profiles: -Pheadless,headless-native
            binary_name: quarkus-forge-headless
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'
            profiles: -Pheadless,headless-native
            binary_name: quarkus-forge-headless
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Set up Visual Studio Build Tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native artifact
        shell: bash
        run: ./mvnw ${{ matrix.profiles }} -Dnative.skip=false -DskipTests package

      - name: Rename native artifact
        shell: bash
        run: |
          cp target/${{ matrix.binary_name }}${{ matrix.ext }} target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}

      - name: Make native artifact executable
        if: runner.os != 'Windows'
        run: chmod +x target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}

      - name: Smoke test native artifact
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}"
          "$binary" --help > /dev/null
          "$binary" --version > /dev/null
          "$binary" generate --help > /dev/null

      - name: Smoke test interactive native startup
        if: runner.os != 'Windows' && matrix.binary_name == 'quarkus-forge'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}"
          python3 scripts/interactive_native_smoke.py --binary "$binary"

      - name: Smoke test Windows interactive native startup
        if: runner.os == 'Windows' && matrix.binary_name == 'quarkus-forge'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/native-smoke
          binary="target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}"
          "$binary" --interactive-smoke-test --verbose 2>&1 | tee target/native-smoke/windows-interactive.log
          grep -F '"event":"tui.render.ready"' target/native-smoke/windows-interactive.log > /dev/null

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}-native-${{ matrix.platform }}
          path: target/${{ matrix.binary_name }}-${{ matrix.platform }}${{ matrix.ext }}

  package-jbang-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate JBang catalog
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p dist
          cp jbang-catalog.json dist/jbang-catalog.json
          sed -i "s#github.com/[^/]*/[^/]*/releases/latest/download/#github.com/${REPO}/releases/download/${TAG}/#g" dist/jbang-catalog.json

      - name: Prepare org-level JBang catalog
        run: cp dist/jbang-catalog.json dist/jbang-catalog-org.json

      - name: Upload JBang catalog
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-forge-jbang-catalog
          path: dist/jbang-catalog.json

      - name: Upload org-level JBang catalog
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-forge-jbang-catalog-org
          path: dist/jbang-catalog-org.json

      - name: Publish org-level catalog repository
        if: startsWith(github.ref, 'refs/tags/v') && env.TOKEN != ''
        env:
          TOKEN: ${{ secrets.JBANG_CATALOG_PUSH_TOKEN }}
          CATALOG_REPO: ayagmar/jbang-catalog
          TAG: ${{ github.ref_name }}
        run: |
          rm -rf .tmp-jbang-catalog
          git clone "https://x-access-token:${TOKEN}@github.com/${CATALOG_REPO}.git" .tmp-jbang-catalog
          cp dist/jbang-catalog-org.json .tmp-jbang-catalog/jbang-catalog.json
          cd .tmp-jbang-catalog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No catalog changes to publish."
            exit 0
          fi
          git add jbang-catalog.json
          git commit -m "Update quarkus-forge alias for ${TAG}"
          git push

  publish-release:
    needs:
      - package-jvm
      - package-native
      - package-jbang-catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Make native artifacts executable
        run: chmod +x artifacts/quarkus-forge-linux-* artifacts/quarkus-forge-macos-* artifacts/quarkus-forge-headless-linux-* artifacts/quarkus-forge-headless-macos-* || true

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: artifacts/*

      - name: Derive release version from git tag
        run: echo "JRELEASER_PROJECT_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish GitHub release with JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
